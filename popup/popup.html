<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="popupTitle">链接标记器</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <div class="popup-header">
      <h3 data-i18n="popupTitle">链接标记器</h3>
    </div>
    
    <div class="popup-body">
      <!-- 全局启用/禁用开关 -->
      <div class="option-item">
        <label for="enabled-toggle" data-i18n="globalEnable">全局启用</label>
        <label class="toggle">
          <input type="checkbox" id="enabled-toggle">
          <span class="toggle-slider"></span>
        </label>
      </div>
      
      <!-- 操作按钮 -->
      <div class="button-group">
        <button id="clear-all-btn" class="btn btn-danger" data-i18n="clearAllMarks">一键清除所有标记</button>
        <button id="options-btn" class="btn btn-primary" data-i18n="optionsSettings">选项设置</button>
        <button id="history-btn" class="btn btn-secondary" data-i18n="history">历史记录</button>
      </div>
      
      <!-- 状态信息 -->
      <div class="status-info">
        <p id="status-text" data-i18n="enabled">已启用</p>
      </div>
    </div>
    
    <div class="popup-footer">
      <p data-i18n="version">版本 1.0.0</p>
    </div>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
